function Badge({ children, color }) {
  return <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: "12px", fontSize: "10px", fontWeight: 600, background: color + "18", color, border: `1px solid ${color}40`, margin: "2px" }}>{children}</span>;
}

function Card({ children, style: s }) {
  return <div style={{ background: "#12122a", borderRadius: "10px", padding: "14px", ...s }}>{children}</div>;
}

function Label({ children, color }) {
  return <div style={{ fontSize: "11px", color: color || "#8892b0", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "8px" }}>{children}</div>;
}

function Metric({ label, value, color }) {
  return (
    <div style={{ background: "#12122a", borderRadius: "8px", padding: "10px 12px", borderLeft: `3px solid ${color}`, flex: 1, minWidth: "130px" }}>
      <div style={{ fontSize: "10px", color: "#6a7a9a", textTransform: "uppercase" }}>{label}</div>
      <div style={{ fontSize: "15px", fontWeight: 700, color: "#e6f1ff", marginTop: "2px" }}>{value}</div>
    </div>
  );
}

function ListItems({ items, color, icon }) {
  return items.map((item, i) => (
    <div key={i} style={{ color: "#a8b2d1", fontSize: "12px", marginBottom: "5px", paddingLeft: "10px", borderLeft: `2px solid ${color}30` }}>{item}</div>
  ));
}

                </Card>
                <Card style={{ background: "#0a0f1e" }}>
                  <Label color="#64ffda">Posición defensiva</Label>
                  <div style={{ color: "#a8b2d1", fontSize: "13px", lineHeight: 1.7 }}>La ventaja competitiva de VU es estructural y temporal: 18 años de relaciones institucionales, integración con registros civiles nacionales, y un modelo de identity-as-infrastructure que ningún competidor puede replicar comprando tecnología. Lo que VU necesita cerrar es el gap de awareness, content, y reconocimiento de analistas.</div>
                </Card>
              </>
            ) : (
              <>
                <Card style={{ background: "#1b0d1e" }}><Label color="#ff6b6b">Amenaza para VU</Label><div style={{ color: "#ccd6f6", fontSize: "13px", lineHeight: 1.7 }}>{comp.threat}</div></Card>
                <Card style={{ background: "#0a0f1e" }}><Label color="#64ffda">Oportunidad para VU</Label><div style={{ color: "#ccd6f6", fontSize: "13px", lineHeight: 1.7 }}>{comp.opportunity}</div></Card>
                <Card style={{ borderLeft: "3px solid #F15E37" }}><Label color="#F15E37">Ventaja competitiva VU</Label><div style={{ color: "#ccd6f6", fontSize: "13px", lineHeight: 1.7 }}>{comp.vuDiff}</div></Card>
              </>
            )}
          </div>
        )}

        {activeSection === "matrix" && (
          <div>
            <Card style={{ marginBottom: "14px", background: "#0a0f1e", border: "1px solid #1a1a3a" }}>
              <Label color="#64ffda">Cómo leer esta matriz</Label>
              <div style={{ fontSize: "12px", color: "#a8b2d1", lineHeight: 1.8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}>
                  <div style={{ width: "60px", height: "10px", background: "linear-gradient(90deg, #F15E37 0%, #F15E37 70%, transparent 70%)", borderRadius: "3px" }} />
                  <span>Cada <strong style={{ color: "#e6f1ff" }}>barra</strong> = puntaje del competidor en esa dimensión.</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}>
                  <span style={{ color: "#F15E37", fontWeight: 700, fontSize: "13px", minWidth: "60px", textAlign: "center" }}>7</span>
                  <span>El <strong style={{ color: "#e6f1ff" }}>número</strong> = puntaje de 0 a 10 (10 = mejor del mercado).</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                  <span style={{ color: "#8892b0", fontSize: "14px", minWidth: "60px", textAlign: "center" }}>click</span>
                  <span><strong style={{ color: "#e6f1ff" }}>Click en el nombre</strong> de cada dimensión para ver qué mide.</span>
                </div>
                <div style={{ marginTop: "6px", padding: "8px 10px", background: "#12122a", borderRadius: "6px", fontSize: "11px", color: "#6a7a9a" }}>
                  * Puntajes relativos dentro de este grupo. Fuentes: revenue, funding, cobertura, Gartner, Forrester, G2, sitios oficiales.
                </div>
              </div>
            </Card>
            <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "14px" }}>
              {matrixPlayers.map((c) => (
                <div key={c.key} style={{ display: "flex", alignItems: "center", gap: "4px" }}>
                  <div style={{ width: "10px", height: "10px", borderRadius: "2px", background: c.color }} />
                  <span style={{ fontSize: "10px", color: "#8892b0" }}>{c.label}</span>
                </div>
              ))}
            </div>
            {matrixDims.map((d, i) => (
              <div key={i} style={{ marginBottom: "12px" }}>
                <div onClick={() => setExpandedDim(expandedDim === d.id ? null : d.id)}
                  style={{ fontSize: "11px", color: expandedDim === d.id ? "#64ffda" : "#8892b0", marginBottom: "3px", fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: "5px", userSelect: "none" }}>
                  <span style={{ fontSize: "10px", opacity: 0.6 }}>{expandedDim === d.id ? "v" : ">"}</span>
                  {d.label} <span style={{ fontSize: "9px", color: "#4a5a7a", fontWeight: 400 }}>*</span>
                </div>
                {expandedDim === d.id && (
                  <div style={{ fontSize: "11px", color: "#6a7a9a", lineHeight: 1.6, padding: "6px 10px", marginBottom: "6px", background: "#0a0f1e", borderRadius: "6px", borderLeft: "2px solid #64ffda40" }}>
                    {d.def}
                  </div>
                )}
                {matrixPlayers.map((c) => (
                  <div key={c.key} style={{ display: "flex", alignItems: "center", gap: "6px", marginBottom: "2px" }}>
                    <div style={{ width: "50px", fontSize: "9px", color: "#4a5a7a", textAlign: "right" }}>{c.label}</div>
                    <div style={{ flex: 1, height: "10px", background: "#0a0f1e", borderRadius: "3px", overflow: "hidden", maxWidth: "280px" }}>
                      <div style={{ width: (d[c.key] * 10) + "%", height: "100%", background: c.color, borderRadius: "3px", opacity: 0.8 }} />
                    </div>
                    <span style={{ fontSize: "10px", color: c.color, fontWeight: 600, minWidth: "16px" }}>{d[c.key]}</span>
                  </div>
                ))}
              </div>
            ))}
            <Card style={{ marginTop: "10px", background: "#0a0f1e", border: "1px dashed #1a1a3a" }}>
              <div style={{ fontSize: "11px", color: "#4a5a7a", lineHeight: 1.7 }}>
                <strong style={{ color: "#6a7a9a" }}>Notas metodológicas:</strong><br />
                - Los puntajes son relativos entre este grupo de competidores, no valores absolutos del mercado.<br />
                - Un 10 = el mejor de este grupo en esa dimensión. Un 0 = no tiene esa capacidad.<br />
                - Profundidad = relaciones + regulación + tiempo operando, no solo presencia comercial.<br />
                - Suite completa penaliza point solutions que requieren múltiples vendors.<br />
                - AI Agent Identity es emergente: puntajes altos = producto en mercado, no solo roadmap.
              </div>
            </Card>
          </div>
        )}

        {/* Footer Summary */}
        <div style={{ marginTop: "24px", padding: "14px", background: "#F15E3710", borderRadius: "10px", borderLeft: "3px solid #F15E37" }}>
          <Label color="#F15E37">Resumen Ejecutivo</Label>
          <div style={{ fontSize: "12px", color: "#a8b2d1", lineHeight: 1.7 }}>
            <strong>Directos:</strong> Sumsub (mayor amenaza por escala + Gartner), Veriff (unicornio entrando a LATAM), MetaMap (adquirida — oportunidad de captura).
            <br /><strong>Indirectos:</strong> Auth0/Okta (CIAM puro — complementario pero riesgo si agrega IDV), Jumio (enterprise global), Facephi (banca LATAM), FaceTec (componente — partnership potencial).
            <br /><strong>Gaps de VU:</strong> Brand awareness, content marketing, premios de analistas tipo Gartner MQ. La fortaleza irreplicable es: 18 años + 8 gobiernos + RENAPER + deployment flexible + AI Agent Identity.
          </div>
        </div>

        <div style={{ textAlign: "center", marginTop: "14px", fontSize: "10px", color: "#2a2a4a" }}>
          Datos: Abril 2026 · Fuentes: Crunchbase, PitchBook, Gartner, Forrester, G2, sitios oficiales, reportes financieros
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
