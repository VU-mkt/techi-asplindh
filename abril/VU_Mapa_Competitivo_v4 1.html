function Badge({ children, color }) {
  return <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: "12px", fontSize: "10px", fontWeight: 600, background: color + "18", color, border: `1px solid ${color}40`, margin: "2px" }}>{children}</span>;
}

function Card({ children, style: s }) {
  return <div style={{ background: "#12122a", borderRadius: "10px", padding: "14px", marginBottom: "10px", ...s }}>{children}</div>;
}

function Label({ children, color }) {
  return <div style={{ fontSize: "11px", color: color || "#8892b0", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "8px" }}>{children}</div>;
}

function Metric({ label, value, color }) {
  return (
    <div style={{ background: "#12122a", borderRadius: "8px", padding: "10px 12px", borderLeft: `3px solid ${color}`, flex: 1, minWidth: "130px" }}>
      <div style={{ fontSize: "10px", color: "#6a7a9a", textTransform: "uppercase" }}>{label}</div>
      <div style={{ fontSize: "15px", fontWeight: 700, color: "#e6f1ff", marginTop: "2px" }}>{value}</div>
    </div>
  );
}

function ListItems({ items, color }) {
  return items.map((item, i) => (
    <div key={i} style={{ color: "#a8b2d1", fontSize: "12px", marginBottom: "5px", paddingLeft: "10px", borderLeft: `2px solid ${color}30` }}>{item}</div>
  ));
}

          <div>
            <h1 style={{ fontSize: "18px", fontWeight: 700, color: "#e6f1ff", margin: 0 }}>Mapa Competitivo Completo</h1>
            <p style={{ fontSize: "10px", color: "#4a5a7a", margin: 0 }}>Actualizado Abril 2026 · 15 competidores + 4 LATAM emergentes + 24 descartados</p>
          </div>
        </div>
        <p style={{ fontSize: "11px", color: "#4a5a7a", margin: "4px 0 16px 0" }}>
          <span style={{ color: "#F15E37" }}>Directos:</span> Incode, Sumsub, Veriff, Persona, Socure ·
          <span style={{ color: "#64ffda" }}> Indirectos:</span> Entrust, Jumio, Daon, Trulioo, Veridas, iProov, Facephi, FaceTec, Auth0/Okta
        </p>

        {/* Competitor Tabs */}
        <div style={{ display: "flex", gap: "2px", marginBottom: "12px", borderBottom: "1px solid #1a1a3a", overflowX: "auto", paddingBottom: "1px" }}>
          {Object.entries(allCompetitors).map(([key, c]) => (
            <button key={key} onClick={() => setActiveComp(key)}
              style={{ padding: "7px 11px", border: "none", cursor: "pointer", fontSize: "11px", fontWeight: activeComp === key ? 700 : 400, background: activeComp === key ? c.color + "15" : "transparent", color: activeComp === key ? c.color : "#6a7a9a", borderBottom: activeComp === key ? `2px solid ${c.color}` : "2px solid transparent", whiteSpace: "nowrap", borderRadius: "6px 6px 0 0" }}>
              {c.name}
            </button>
          ))}
        </div>

        {/* Section Nav */}
        <div style={{ display: "flex", gap: "3px", flexWrap: "wrap", marginBottom: "14px" }}>
          {sections.map((s) => (
            <button key={s.id} onClick={() => setActiveSection(s.id)}
              style={{ padding: "4px 10px", borderRadius: "14px", border: activeSection === s.id ? "1px solid #F15E37" : "1px solid #1a1a3a", background: activeSection === s.id ? "#F15E3715" : "transparent", color: activeSection === s.id ? "#F15E37" : "#6a7a9a", cursor: "pointer", fontSize: "11px", fontWeight: activeSection === s.id ? 600 : 400 }}>
              {s.label}
            </button>
          ))}
        </div>

        <div style={{ marginBottom: "12px" }}><Badge color={comp.color}>{comp.type}</Badge></div>

        {/* === OVERVIEW === */}
        {activeSection === "overview" && (
          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
            <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
              <Metric label="Fundada" value={comp.founded} color={comp.color} />
              <Metric label="HQ" value={comp.hq} color={comp.color} />
              <Metric label="Funding" value={comp.funding} color={comp.color} />
            </div>
            <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
              <Metric label="Empleados" value={comp.employees} color={comp.color} />
              <Metric label="Revenue" value={comp.revenue} color={comp.color} />
              <Metric label="Clientes" value={comp.clientCount} color={comp.color} />
            </div>
            <Card><Label color={comp.color}>Clientes destacados</Label><div style={{ color: "#ccd6f6", fontSize: "13px" }}>{comp.clients}</div></Card>
            <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
              <Card style={{ flex: 1, minWidth: "220px" }}><Label color="#00cc88">Fortalezas</Label><ListItems items={comp.strengths} color="#00cc88" /></Card>
              <Card style={{ flex: 1, minWidth: "220px" }}><Label color="#ff6b6b">Debilidades</Label><ListItems items={comp.weaknesses} color="#ff6b6b" /></Card>
            </div>
          </div>
        )}

        {/* === BUSINESS MODEL === */}
        {activeSection === "business" && (

                { name: "NEC", reason: "Biometría gov/law enforcement (AFIS). Physical-first. No compete en digital SaaS." },
                { name: "GBG", reason: "Identity + fraud data (UK-based). Más data bureau que plataforma IDV. Nicho." },
              ]},
              { cat: "BIOMETRICS COMPONENTS (representados por FaceTec/iProov)", color: "#9C27B0", items: [
                { name: "Innovatrics", reason: "SDK biométrico. Componente similar a FaceTec. No plataforma." },
                { name: "Mobbeel", reason: "SDK biométrico España/LATAM. Empresa chica. Componente, no competidor." },
              ]},
              { cat: "OTROS (tangenciales)", color: "#00ACC1", items: [
                { name: "Prove", reason: "Identity via telco data (phone-centric). Nicho diferente. Sin biometría ni CIAM." },
                { name: "Transmit Security", reason: "Identity orchestration/CIAM. Más cercano a Auth0 que a VU. Sin IDV core." },
                { name: "AU10TIX", reason: "Doc validation. Fue Gartner Visionary 2024 pero sin diferenciación vs Sumsub/Incode." },
                { name: "MetaMap", reason: "Adquirida por Incode (Jun 2024). Ya no existe como empresa independiente." },
              ]},
            ].map((group, gi) => (
              <Card key={gi} style={{ background: "#0a0f1e" }}>
                <div style={{ fontSize: "12px", fontWeight: 700, color: group.color, marginBottom: "10px", textTransform: "uppercase", letterSpacing: "0.5px" }}>{group.cat}</div>
                {group.items.map((item, ii) => (
                  <div key={ii} style={{ display: "flex", gap: "10px", marginBottom: "6px", paddingBottom: "6px", borderBottom: ii < group.items.length - 1 ? "1px solid #1a1a3a" : "none" }}>
                    <div style={{ minWidth: "120px", color: "#e6f1ff", fontSize: "12px", fontWeight: 600 }}>{item.name}</div>
                    <div style={{ color: "#6a7a9a", fontSize: "11px", lineHeight: 1.5 }}>{item.reason}</div>
                  </div>
                ))}
              </Card>
            ))}
            <Card style={{ borderLeft: "3px solid #64ffda", background: "#0a0f1e" }}>
              <Label color="#64ffda">Resumen</Label>
              <div style={{ color: "#a8b2d1", fontSize: "12px", lineHeight: 1.7 }}>De las 43 empresas marcadas como "Directa" en el Excel original, <strong style={{ color: "#e6f1ff" }}>15 tienen perfil completo</strong> en este mapa, <strong style={{ color: "#e6f1ff" }}>4 son LATAM emergentes</strong> monitoreados, y <strong style={{ color: "#e6f1ff" }}>24 fueron descartados</strong> por ser tangenciales, redundantes, o de mercados diferentes al de VU.</div>
            </Card>
          </div>
        )}

        {/* Footer */}
        <div style={{ marginTop: "24px", padding: "14px", background: "#F15E3710", borderRadius: "10px", borderLeft: "3px solid #F15E37" }}>
          <Label color="#F15E37">Resumen Ejecutivo</Label>
          <div style={{ fontSize: "12px", color: "#a8b2d1", lineHeight: 1.7 }}>
            <strong>Directos (5):</strong> Sumsub (Gartner #1, $120M), Socure ($315M ARR, $4.5B), Persona (Gartner #1 Execution, $2B), Incode (unicornio LATAM), Veriff (unicornio sin Gartner MQ).
            <br /><strong>Indirectos (10):</strong> Entrust (bajó en Gartner), Jumio (cayó del MQ), Auth0/Okta ($2.6B CIAM), Daon (nuevo Gartner Leader), Trulioo (unicornio data), Veridas (Gartner Visionary, expansión LATAM), iProov (gov-grade liveness), Facephi (banca LATAM), FaceTec (componente).
            <br /><strong>LATAM emergentes (4):</strong> Truora (Colombia), Unico (Brasil, $120M), idwall (Brasil), Tu Identidad (México).
            <br /><strong>Descartados (24):</strong> Fraud-only, IAM puros, enterprise legacy, componentes biométricos.
            <br /><strong>Señales clave:</strong> Jumio cayó del Gartner MQ 2025. Entrust bajó. Persona subió de Niche a Leader. Daon y Veridas entraron nuevos. Veriff sigue fuera.
          </div>
        </div>

        <div style={{ textAlign: "center", marginTop: "14px", fontSize: "10px", color: "#2a2a4a" }}>
          Datos: Abril 2026 · Fuentes: Gartner MQ 2024+2025, Forrester, Crunchbase, PitchBook, G2, Forbes, sitios oficiales, reportes financieros
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
