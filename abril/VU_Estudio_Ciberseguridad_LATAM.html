function C({ children, style: s }) { return <div style={{ background: "#12122a", borderRadius: "10px", padding: "14px", ...s }}>{children}</div>; }
function L({ children, color }) { return <div style={{ fontSize: "11px", color: color || "#8892b0", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "8px" }}>{children}</div>; }

function Bar({ value, max, color, label }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "6px", marginBottom: "3px" }}>
      <div style={{ width: "90px", fontSize: "10px", color: "#6a7a9a", textAlign: "right" }}>{label}</div>
      <div style={{ flex: 1, height: "12px", background: "#0a0f1e", borderRadius: "4px", overflow: "hidden", maxWidth: "200px" }}>
        <div style={{ width: `${(value / max) * 100}%`, height: "100%", background: color, borderRadius: "4px", opacity: 0.85 }} />
      </div>
      <span style={{ fontSize: "11px", color, fontWeight: 600, minWidth: "24px" }}>{value}</span>
    </div>
  );
}

function ScoreCircle({ value, label, color }) {
  return (
    <div style={{ textAlign: "center", minWidth: "55px" }}>
      <div style={{ width: "40px", height: "40px", borderRadius: "50%", background: `conic-gradient(${color} ${value * 36}deg, #1a1a3a ${value * 36}deg)`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 4px" }}>
        <div style={{ width: "30px", height: "30px", borderRadius: "50%", background: "#12122a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "12px", fontWeight: 700, color }}>{value}</div>
      </div>
      <div style={{ fontSize: "9px", color: "#6a7a9a", lineHeight: 1.2 }}>{label}</div>
    </div>
  );
}

              <L color="#F15E37">Resumen — Peso de los obstáculos</L>
              <div style={{ fontSize: "12px", color: "#a8b2d1", lineHeight: 1.8 }}>
                El obstáculo #1 es <strong style={{ color: "#ff6b6b" }}>presupuesto</strong>: LATAM gasta 30-40% menos que NA/EU en ciberseguridad por empleado. El #2 es <strong style={{ color: "#FDCB6E" }}>talento</strong>: el déficit de 750K profesionales solo en Brasil genera dependencia de vendors y managed services. El #3 es <strong style={{ color: "#6C5CE7" }}>madurez</strong>: muchas empresas aún están en passwords + firewall. La buena noticia para VU: estos obstáculos favorecen plataformas all-in-one como VU ONE que reducen complejidad, y servicios managed/NoCode como Identity Link que no requieren equipos internos grandes.
              </div>
            </C>
          </div>
        )}

        {/* ═══ STRATEGIES TAB ═══ */}
        {tab === "strategies" && (
          <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
            {strategies.map((s, i) => (
              <C key={i} style={{ borderLeft: `3px solid ${s.color}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "6px" }}>
                  <L color={s.color}>{s.title}</L>
                  <span style={{ fontSize: "10px", padding: "2px 8px", borderRadius: "10px", background: s.color + "20", color: s.color, fontWeight: 600 }}>{s.priority}</span>
                </div>
                <div style={{ color: "#ccd6f6", fontSize: "12px", lineHeight: 1.7 }}>{s.desc}</div>
              </C>
            ))}
          </div>
        )}

        {/* ═══ GLOSSARY TAB ═══ */}
        {tab === "glossary" && (() => {
          const q = gSearch.toLowerCase();
          const filtered = glossary
            .filter(cat => gCat === "all" || cat.cat === gCat)
            .map(cat => ({
              ...cat,
              terms: cat.terms.filter(t => !q || t.term.toLowerCase().includes(q) || t.def.toLowerCase().includes(q))
            }))
            .filter(cat => cat.terms.length > 0);
          const totalTerms = filtered.reduce((sum, cat) => sum + cat.terms.length, 0);
          return (
          <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
            {/* Search bar */}
            <div style={{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" }}>
              <div style={{ flex: 1, minWidth: "200px", position: "relative" }}>
                <input
                  type="text"
                  placeholder="Buscar término o concepto..."
                  value={gSearch}
                  onChange={e => setGSearch(e.target.value)}
                  style={{ width: "100%", padding: "10px 14px 10px 36px", borderRadius: "10px", border: "1px solid #1a1a3a", background: "#12122a", color: "#e6f1ff", fontSize: "13px", outline: "none" }}
                  onFocus={e => e.target.style.borderColor = "#F15E37"}
                  onBlur={e => e.target.style.borderColor = "#1a1a3a"}
                />
                <span style={{ position: "absolute", left: "12px", top: "50%", transform: "translateY(-50%)", color: "#4a5a7a", fontSize: "14px" }}>&#128269;</span>
              </div>
              <div style={{ fontSize: "11px", color: "#4a5a7a" }}>{totalTerms} términos</div>
            </div>

            {/* Category filters */}
            <div style={{ display: "flex", gap: "4px", flexWrap: "wrap" }}>
              <button onClick={() => setGCat("all")} style={{ padding: "5px 12px", borderRadius: "14px", border: gCat === "all" ? "1px solid #F15E37" : "1px solid #1a1a3a", background: gCat === "all" ? "#F15E3715" : "transparent", color: gCat === "all" ? "#F15E37" : "#6a7a9a", cursor: "pointer", fontSize: "11px", fontWeight: gCat === "all" ? 600 : 400 }}>Todas</button>
              {glossary.map((cat, i) => (
                <button key={i} onClick={() => setGCat(gCat === cat.cat ? "all" : cat.cat)} style={{ padding: "5px 12px", borderRadius: "14px", border: gCat === cat.cat ? `1px solid ${cat.color}` : "1px solid #1a1a3a", background: gCat === cat.cat ? cat.color + "15" : "transparent", color: gCat === cat.cat ? cat.color : "#6a7a9a", cursor: "pointer", fontSize: "11px", fontWeight: gCat === cat.cat ? 600 : 400 }}>
                  {cat.cat.split(" ")[0]}
                </button>
              ))}
            </div>

            {/* Terms */}
            {filtered.length === 0 ? (
              <C style={{ textAlign: "center", padding: "30px" }}>
                <div style={{ fontSize: "14px", color: "#4a5a7a" }}>No se encontraron términos para "{gSearch}"</div>
              </C>
            ) : filtered.map((cat, ci) => (
              <C key={ci}>
                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}>
                  <div style={{ width: "4px", height: "16px", borderRadius: "2px", background: cat.color }} />
                  <L color={cat.color} style={{ margin: 0 }}>{cat.cat}</L>
                  <span style={{ fontSize: "10px", color: "#4a5a7a", background: "#0a0f1e", padding: "2px 8px", borderRadius: "10px" }}>{cat.terms.length}</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: "2px" }}>
                  {cat.terms.map((t, ti) => {
                    const key = cat.cat + "-" + ti;
                    const isOpen = gExpanded === key;
                    const highlight = (text) => {
                      if (!q) return text;
                      const idx = text.toLowerCase().indexOf(q);
                      if (idx === -1) return text;
                      return (<>{text.slice(0, idx)}<mark style={{ background: "#F15E3740", color: "#e6f1ff", padding: "0 2px", borderRadius: "2px" }}>{text.slice(idx, idx + q.length)}</mark>{text.slice(idx + q.length)}</>);
                    };
                    return (
                      <div key={ti}
                        onClick={() => setGExpanded(isOpen ? null : key)}
                        style={{ padding: "10px 12px", borderRadius: "8px", background: isOpen ? "#0a0f1e" : ti % 2 === 0 ? "#0d1220" : "transparent", cursor: "pointer", transition: "all 0.15s", borderLeft: isOpen ? `3px solid ${cat.color}` : "3px solid transparent" }}
                        onMouseEnter={e => { if (!isOpen) e.currentTarget.style.background = "#0d1220"; }}
                        onMouseLeave={e => { if (!isOpen) e.currentTarget.style.background = ti % 2 === 0 ? "#0d1220" : "transparent"; }}
                      >
                        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                          <span style={{ fontSize: "10px", color: "#4a5a7a", transition: "transform 0.15s", transform: isOpen ? "rotate(90deg)" : "rotate(0deg)" }}>&#9654;</span>
                          <span style={{ fontSize: "13px", fontWeight: 700, color: isOpen ? cat.color : "#e6f1ff" }}>{highlight(t.term)}</span>
                          {!isOpen && <span style={{ fontSize: "11px", color: "#4a5a7a", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{t.def.slice(0, 60)}...</span>}
                        </div>
                        {isOpen && (
                          <div style={{ marginTop: "8px", marginLeft: "22px", fontSize: "13px", color: "#ccd6f6", lineHeight: 1.7 }}>
                            {highlight(t.def)}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </C>
            ))}

            <C style={{ background: "#0a0f1e", border: "1px dashed #1a1a3a" }}>
              <div style={{ fontSize: "11px", color: "#4a5a7a", lineHeight: 1.7 }}>
                <strong style={{ color: "#6a7a9a" }}>Tip:</strong> Usá el buscador para encontrar cualquier término. Hacé click en un término para expandir su definición completa. Filtrá por categoría con los botones de arriba.
              </div>
            </C>
          </div>
          );
        })()}

        {/* Footer */}
        <div style={{ marginTop: "24px", padding: "14px", background: "#F15E3710", borderRadius: "10px", borderLeft: "3px solid #F15E37" }}>
          <L color="#F15E37">Conclusión</L>
          <div style={{ fontSize: "12px", color: "#a8b2d1", lineHeight: 1.7 }}>
            El mercado de ciberseguridad en LATAM crece a $14.4B en 2025 con CAGR 12.4%. Las áreas de VU (identity + fraud + auth) representan ~$3.57B y crecen más rápido que el promedio (15-20% CAGR). Brasil concentra el 49% del mercado, seguido por México (19%) y Argentina (8%). BFSI es la vertical líder con 26% del gasto. La oportunidad más urgente es iGaming Brasil, la más estratégica es escalar el modelo RENAPER, y la más diferenciadora es AI Agent Identity. El gap principal de VU sigue siendo brand awareness y content marketing vs competidores con 5-10x más presupuesto.
          </div>
        </div>

        <div style={{ textAlign: "center", marginTop: "14px", fontSize: "10px", color: "#2a2a4a" }}>
          Fuentes: Grand View Research, Mordor Intelligence, MarketsandMarkets, Market Data Forecast, IMARC Group, Emergen Research, Fortune BI, Gartner, Forrester, Kaspersky, SonicWall, OAS · Abril 2026
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
