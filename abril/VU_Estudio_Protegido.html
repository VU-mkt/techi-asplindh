<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080816;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.lock{text-align:center;padding:40px;max-width:420px;width:90%}
.logo{width:120px;margin:0 auto 24px;display:block}
h1{color:#e6f1ff;font-size:20px;margin-bottom:6px}
.sub{color:#6a7a9a;font-size:13px;margin-bottom:24px;line-height:1.5}
.iw{position:relative;margin-bottom:16px}
input[type=password],input[type=text]{width:100%;padding:14px 48px 14px 16px;border-radius:10px;border:1px solid #1a1a3a;background:#12122a;color:#e6f1ff;font-size:15px;outline:none;transition:border-color .2s;font-family:inherit}
input:focus{border-color:#F15E37}
.tp{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#4a5a7a;cursor:pointer;font-size:18px;padding:4px}
.btn{width:100%;padding:14px;border-radius:10px;border:none;background:#F15E37;color:white;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;font-family:inherit}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:wait}
.err{color:#ff6b6b;font-size:12px;margin-top:8px;min-height:18px}
.hint{color:#3a4a6a;font-size:11px;margin-top:16px}
.sp{display:inline-block;width:16px;height:16px;border:2px solid #fff4;border-top-color:#fff;border-radius:50%;animation:s .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
</style>

const CHECK="GR2V7aYBkMM=";
function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function go(){
const pw=document.getElementById("pw").value;
const btn=document.getElementById("btn");
const err=document.getElementById("err");
if(!pw){err.textContent="Ingresá una contraseña";return}
btn.disabled=true;btn.innerHTML='<span class="sp"></span>Desencriptando...';err.textContent="";
try{
const salt=b64d(SALT_B64);const enc=b64d(ENC_B64);
const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
const kb=await crypto.subtle.deriveBits({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"},km,256);
const seed=new Uint8Array(kb);
let ks=new Uint8Array(enc.length);let block=seed;let off=0;
while(off<enc.length){
const c=new Uint8Array(block.length+seed.length);c.set(block);c.set(seed,block.length);
const hb=await crypto.subtle.digest("SHA-256",c);block=new Uint8Array(hb);
const cp=Math.min(32,enc.length-off);ks.set(block.subarray(0,cp),off);off+=cp;}
const dec=new Uint8Array(enc.length);
for(let i=0;i<enc.length;i++)dec[i]=enc[i]^ks[i];
const html=new TextDecoder().decode(dec);
const f64=dec.slice(0,64);
const hv=await crypto.subtle.digest("SHA-256",f64);
const chk=btoa(String.fromCharCode(...new Uint8Array(hv).slice(0,8)));
if(chk!==CHECK)throw new Error("bad");
document.open();document.write(html);document.close();
}catch(e){
err.textContent="Contraseña incorrecta";btn.disabled=false;btn.innerHTML="Desbloquear";
document.getElementById("pw").select();}}
document.getElementById("pw").focus();
</script>
